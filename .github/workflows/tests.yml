name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        # The whole test suite runs on Postgres (see tests/Pest.php). `postgres`
        # is a superuser, which the suite requires so non-tenancy tests bypass
        # RLS (asserted by tests/Feature/Tenancy/DatabaseRoleTest). This creates
        # the base `ezsite_testing` DB; the parallel runner clones per-worker
        # copies off it and runs its own migrate:fresh.
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ezsite_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, pgsql
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_CACHE_DIR: /tmp/composer-cache

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # The tenancy layer does a check-then-CREATE USER for the cluster-global
      # `tenancy_rls` role (vendor ManagesPostgresUsers::createUser). Under
      # `pest --parallel`, every worker's first migrate:fresh fires `tenants:rls`
      # at once and they race — one creates the role, the rest crash with
      # "role tenancy_rls already exists". Creating it once, serially, up front
      # makes every worker take the idempotent "already exists" path. Credentials
      # mirror .env.example (TENANCY_RLS_USERNAME / TENANCY_RLS_PASSWORD); these
      # are throwaway local/CI test creds, not secrets. See .claude/docs/tenancy.md.
      - name: Pre-create the RLS role (prevents a parallel CREATE USER race)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 5432 -U postgres -d ezsite_testing -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'tenancy_rls') THEN
              CREATE ROLE tenancy_rls LOGIN PASSWORD 'tenancy_rls_local_dev_password';
            END IF;
          END
          $$;
          SQL

      - name: Type Coverage
        run: composer test:type-coverage

      - name: Tests
        run: composer test:unit
